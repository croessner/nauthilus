{{ template "idp_header.html" . }}
<div class="max-w-md mx-auto">
    <section class="card bg-base-100 border border-base-300 shadow-sm">
        <div class="card-body gap-4">
            <h1 class="text-2xl font-semibold">{{ .AdminLoginTitle }}</h1>

            {{ if .AdminLoginError }}
            <div class="alert alert-error text-sm" role="alert">{{ .AdminLoginError }}</div>
            {{ end }}

            <form action="{{ .AdminBasePath }}/login" class="space-y-3" method="post">
                <input name="csrf_token" type="hidden" value="{{ .CSRFToken }}"/>
                <label class="form-control">
                    <span class="label-text text-xs mb-1">{{ .AdminLoginUsernameLabel }}</span>
                    <input autocomplete="username" class="input input-bordered input-sm" name="username" required
                           type="text"/>
                </label>

                <label class="form-control">
                    <span class="label-text text-xs mb-1">{{ .AdminLoginPasswordLabel }}</span>
                    <input autocomplete="current-password" class="input input-bordered input-sm" name="password"
                           required type="password"/>
                </label>

                <button class="btn btn-sm btn-primary w-full" type="submit">{{ .AdminLoginSubmit }}</button>
            </form>
        </div>
    </section>
</div>
{{ template "idp_footer.html" . }}
