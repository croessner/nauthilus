# Nauthilus test configuration for CSV-backed Lua backend
# This config is intended for local testing with the test client in client/.
# Start example:
#   TESTING_CSV=client/logins.csv ./nauthilus -config client/nauthilus.yml -config-format yaml

runtime:
  instance_name: "nauthilus-testing"

  listen:
    address: "0.0.0.0:8080"

  http:
    keep_alive:
      enabled: true

observability:
  log:
    level: "warn"
    add_source: true
    json: true

storage:
  redis:
    primary:
      address: "127.0.0.1:6379"
    database_number: 0
    prefix: "nt:"
    pool_size: 128
    idle_pool_size: 16
    positive_cache_ttl: 3600
    negative_cache_ttl: 7200

    batching:
      enabled: true

auth:
  pipeline:
    max_concurrent_requests: 10000

  backends:
    order: [cache, lua]

    lua:
      backend:
        default:
          backend_script_path: "server/lua-plugins.d/backend/testing_csv_backend.lua"
          init_script_paths:
            - "server/lua-plugins.d/init/testing_csv_loader.lua"
          package_path: "server/lua-plugins.d/share/?.lua;server/lua-plugins.d/backend/?.lua;server/lua-plugins.d/init/?.lua"
          backend_number_of_workers: 32
          action_number_of_workers: 32
          feature_vm_pool_size: 48
          filter_vm_pool_size: 48
          hook_vm_pool_size: 48
          queue_length: 0

        search:
          - protocol: [imap, pop3, smtp, http]
            cache_name: default

  controls:
    enabled: [lua, brute_force]

    brute_force:
      protocols: [imap, pop3, smtp, http]
      pw_history_for_known_accounts: true
      tolerate_percent: 3
      tolerate_ttl: 30m
      adaptive_toleration: true
      min_tolerate_percent: 3
      max_tolerate_percent: 50

      buckets:
        - { name: b_1m_ipv4_24_mail, period: 1m, cidr: 24, ipv4: true, failed_requests: 15,
            filter_by_protocol: [imap, pop3, smtp] }
        - { name: b_1m_ipv4_32_default, period: 1m, cidr: 32, ipv4: true, failed_requests: 8,
            filter_by_protocol: [http] }
        - { name: b_1h_ipv4_24, period: 1h, cidr: 24, ipv4: true, failed_requests: 25 }
        - { name: b_1d_ipv4_24, period: 24h, cidr: 24, ipv4: true, failed_requests: 35 }
        - { name: b_1w_ipv4_24, period: 168h, cidr: 24, ipv4: true, failed_requests: 40 }
        - { name: b_1M_ipv4_24, period: 672h, cidr: 24, ipv4: true, failed_requests: 50 }

    lua:
      actions:
        - type: brute_force
          name: brute_force_header
          script_path: server/lua-plugins.d/actions/bruteforce_header.lua

# Notes:
# - The CSV path can be provided via environment variable TESTING_CSV.
#   If unset, the init script falls back to client/logins.csv.
# - The test client defaults to POST http://localhost:8080/api/v1/auth/json with JSON body.
