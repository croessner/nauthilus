<div class="card-body gap-4">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div>
            <h2 class="card-title">{{ .AdminHookTesterTitle }}</h2>
            <p class="text-sm opacity-75">{{ .AdminHookTesterHint }}</p>
        </div>
        <div class="badge badge-outline">internal execution</div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-4">
        <form class="card bg-base-200 border border-base-300" data-api-send-url="{{ .AdminBasePath }}/api/hooktester/send"
              id="admin-hooktester-form">
            <div class="card-body gap-3">
                <h3 class="font-semibold">Request</h3>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                    <label class="form-control">
                        <span class="label-text text-xs mb-1">{{ .AdminHookTesterMethod }}</span>
                        <select class="select select-bordered select-sm" name="method">
                            <option>GET</option>
                            <option selected>POST</option>
                            <option>PUT</option>
                            <option>PATCH</option>
                            <option>DELETE</option>
                        </select>
                    </label>

                    <label class="form-control md:col-span-2">
                        <span class="label-text text-xs mb-1">{{ .AdminHookTesterEndpointPath }}</span>
                        <input class="input input-bordered input-sm" name="endpoint_path"
                               placeholder="/hooks/clickhouse-query" type="text" value="/hooks/clickhouse-query"/>
                    </label>
                </div>

                <label class="form-control">
                    <span class="label-text text-xs mb-1">{{ .AdminHookTesterQuery }}</span>
                    <textarea class="textarea textarea-bordered text-xs font-mono" name="query_json" rows="3">{"page":"1","page_size":"25"}</textarea>
                </label>

                <label class="form-control">
                    <span class="label-text text-xs mb-1">{{ .AdminHookTesterHeaders }}</span>
                    <textarea class="textarea textarea-bordered text-xs font-mono" name="headers_json" rows="3">{"x-request-id":"admin-ui"}</textarea>
                </label>

                <label class="form-control">
                    <span class="label-text text-xs mb-1">{{ .AdminHookTesterContentType }}</span>
                    <input class="input input-bordered input-sm" name="content_type" type="text"
                           value="application/json"/>
                </label>

                <label class="form-control">
                    <span class="label-text text-xs mb-1">{{ .AdminHookTesterBody }}</span>
                    <textarea class="textarea textarea-bordered text-xs font-mono" name="body" rows="7">{"action":"recent"}</textarea>
                </label>

                <div class="flex flex-wrap gap-2">
                    <button class="btn btn-sm btn-primary" data-hooktester-send type="button">{{ .AdminHookTesterSend
                        }}
                    </button>
                    <button class="btn btn-sm btn-outline" type="reset">{{ .AdminHookTesterReset }}</button>
                </div>
            </div>
        </form>

        <section class="card bg-base-200 border border-base-300" id="hooktester-response">
            <div class="card-body gap-3">
                <h3 class="font-semibold">{{ .AdminHookTesterResponse }}</h3>

                <div class="stats stats-vertical lg:stats-horizontal shadow border border-base-300 bg-base-100">
                    <div class="stat py-3">
                        <div class="stat-title text-xs">{{ .AdminHookTesterHTTPStatus }}</div>
                        <div class="stat-value text-lg" id="admin-hooktester-status">-</div>
                    </div>
                    <div class="stat py-3">
                        <div class="stat-title text-xs">{{ .AdminHookTesterContentType }}</div>
                        <div class="stat-value text-sm" id="admin-hooktester-content-type">-</div>
                    </div>
                </div>

                <div class="alert alert-error hidden text-xs" id="admin-hooktester-error" role="alert"></div>

                <label class="form-control">
                    <span class="label-text text-xs mb-1">{{ .AdminHookTesterResponseHeaders }}</span>
                    <textarea class="textarea textarea-bordered text-xs font-mono"
                              id="admin-hooktester-response-headers" readonly rows="5">{}</textarea>
                </label>

                <label class="form-control">
                    <span class="label-text text-xs mb-1">{{ .AdminHookTesterResponseBody }}</span>
                    <textarea class="textarea textarea-bordered text-xs font-mono" id="admin-hooktester-response-body"
                              readonly rows="10">{}</textarea>
                </label>
            </div>
        </section>
    </div>
</div>
