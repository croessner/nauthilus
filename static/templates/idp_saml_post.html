{{ template "idp_header.html" . }}

<div class="flex justify-center items-center mt-10">
    <div class="card w-full max-w-xl bg-base-100 shadow-xl">
        <div class="card-body items-center text-center">
            <span aria-hidden="true" class="loading loading-spinner loading-lg text-primary mb-4"></span>
            <h2 class="card-title text-2xl mb-2">{{ .SAMLPostTitle }}</h2>
            <p class="mb-2">{{ .SAMLPostMessage }}</p>
            <p class="text-sm opacity-70 mb-6">{{ .SAMLPostHint }}</p>
            <form action="{{ .SAMLPostURL }}" data-autosubmit="{{ if .AutoSubmitSAMLForm }}1{{ else }}0{{ end }}"
                  id="SAMLResponseForm" method="post">
                <input name="SAMLResponse" type="hidden" value="{{ .SAMLResponse }}"/>
                <input name="RelayState" type="hidden" value="{{ .RelayState }}"/>
                <button class="btn btn-primary w-full sm:w-auto" id="SAMLSubmitButton" type="submit">
                    {{ .Continue }}
                </button>
            </form>
        </div>
    </div>
</div>

{{ template "idp_footer.html" . }}
