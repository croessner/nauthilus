---
name: Docker Build Push Reusable

"on":
  workflow_call:
    inputs:
      source_ref:
        description: Git ref to check out before building.
        required: false
        default: ''
        type: string
      fetch_depth:
        description: Checkout fetch depth for the source ref.
        required: false
        default: 1
        type: number
      checkout_path:
        description: Workspace path for the checked-out source.
        required: false
        default: source
        type: string
      context_path:
        description: Build context path relative to the checkout path.
        required: false
        default: .
        type: string
      dockerfile_path:
        description: Dockerfile path relative to the checkout path.
        required: true
        type: string
      platforms:
        description: Target platforms passed to docker/build-push-action.
        required: false
        default: linux/amd64,linux/arm64
        type: string
      push:
        description: Whether to push the resulting image.
        required: false
        default: true
        type: boolean
      sbom:
        description: Whether to generate an SBOM during the image build.
        required: false
        default: false
        type: boolean
      tags:
        description: Image tags passed to docker/build-push-action.
        required: true
        type: string
      annotations:
        description: OCI annotations passed to docker/build-push-action.
        required: false
        default: ''
        type: string
      labels:
        description: OCI labels passed to docker/build-push-action.
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  build-native-platform:
    if: ${{ inputs.push && inputs.platforms == 'linux/amd64,linux/arm64' }}
    name: build / ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: linux-arm64

    steps:
      - name: Check out source
        if: ${{ inputs.source_ref == '' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          path: ${{ inputs.checkout_path }}

      - name: Check out source ref
        if: ${{ inputs.source_ref != '' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          path: ${{ inputs.checkout_path }}
          ref: ${{ inputs.source_ref }}

      - name: Resolve image name
        id: image
        env:
          TAGS: ${{ inputs.tags }}
        run: |
          first_tag="$(printf '%s\n' "${TAGS}" | sed -n '/[^[:space:]]/{p;q}')"

          if [[ -z "${first_tag}" ]]; then
            echo "At least one image tag is required" >&2
            exit 1
          fi

          echo "name=${first_tag%:*}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push digest
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: >-
            ./${{ inputs.checkout_path }}/${{ inputs.context_path }}
          file: >-
            ./${{ inputs.checkout_path }}/${{ inputs.dockerfile_path }}
          platforms: ${{ matrix.platform }}
          sbom: ${{ inputs.sbom }}
          outputs: >-
            type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          annotations: ${{ inputs.annotations }}
          labels: ${{ inputs.labels }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: digests-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-native-manifest:
    if: ${{ inputs.push && inputs.platforms == 'linux/amd64,linux/arm64' }}
    runs-on: ubuntu-latest
    needs: build-native-platform

    steps:
      - name: Download digests
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Resolve image metadata
        id: image
        env:
          ANNOTATIONS: ${{ inputs.annotations }}
          TAGS: ${{ inputs.tags }}
        run: |
          first_tag="$(printf '%s\n' "${TAGS}" | sed -n '/[^[:space:]]/{p;q}')"

          if [[ -z "${first_tag}" ]]; then
            echo "At least one image tag is required" >&2
            exit 1
          fi

          echo "name=${first_tag%:*}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Create manifest list
        working-directory: /tmp/digests
        env:
          ANNOTATIONS: ${{ inputs.annotations }}
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          TAGS: ${{ inputs.tags }}
        run: |
          tag_args=()
          annotation_args=()
          digest_refs=()

          while IFS= read -r tag; do
            if [[ -n "${tag//[[:space:]]/}" ]]; then
              tag_args+=("-t" "${tag}")
            fi
          done <<< "${TAGS}"

          while IFS= read -r annotation; do
            if [[ -z "${annotation//[[:space:]]/}" ]]; then
              continue
            fi

            case "${annotation}" in
              index,manifest:*)
                annotation_args+=("--annotation" "index:${annotation#index,manifest:}")
                ;;
              manifest,index:*)
                annotation_args+=("--annotation" "index:${annotation#manifest,index:}")
                ;;
              manifest:*)
                ;;
              *)
                annotation_args+=("--annotation" "${annotation}")
                ;;
            esac
          done <<< "${ANNOTATIONS}"

          for digest_file in *; do
            digest_refs+=("${IMAGE_NAME}@sha256:${digest_file}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${annotation_args[@]}" "${digest_refs[@]}"

  build:
    if: ${{ !inputs.push || inputs.platforms != 'linux/amd64,linux/arm64' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        if: ${{ inputs.source_ref == '' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          path: ${{ inputs.checkout_path }}

      - name: Check out source ref
        if: ${{ inputs.source_ref != '' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          path: ${{ inputs.checkout_path }}
          ref: ${{ inputs.source_ref }}

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: >-
            ./${{ inputs.checkout_path }}/${{ inputs.context_path }}
          file: >-
            ./${{ inputs.checkout_path }}/${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          sbom: ${{ inputs.sbom }}
          tags: ${{ inputs.tags }}
          annotations: ${{ inputs.annotations }}
          labels: ${{ inputs.labels }}
