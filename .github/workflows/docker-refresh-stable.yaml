---
name: Stable Docker Refresh

"on":
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: read

jobs:
  detect-base-image-updates:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.latest_release.outputs.release_tag }}
      should_rebuild: ${{ steps.compare.outputs.should_rebuild }}

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: >-
          docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Determine latest stable release
        id: latest_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="$(gh release list \
            --repo "${{ github.repository }}" \
            --exclude-drafts \
            --exclude-pre-releases \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName')"

          if [[ -z "${release_tag}" || "${release_tag}" == "null" ]]; then
            echo "No published stable release found" >&2
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Resolve current base image digests
        id: base_digests
        run: |
          while IFS= read -r line; do
            echo "${line}" >> "${GITHUB_OUTPUT}"
          done < <(./scripts/docker-base-digests.sh)

      - name: Compare against published stable image
        id: compare
        env:
          RELEASE_TAG: ${{ steps.latest_release.outputs.release_tag }}
          ALPINE_DIGEST: ${{ steps.base_digests.outputs.alpine_digest }}
          GOLANG_DIGEST: ${{ steps.base_digests.outputs.golang_digest }}
        run: |
          registry_image="ghcr.io/${{ github.repository_owner }}/nauthilus"
          image="${registry_image}:${RELEASE_TAG}"

          while IFS= read -r line; do
            echo "${line}" >> "${GITHUB_OUTPUT}"
          done < <(
            ./scripts/docker-stable-refresh-check.sh \
              --image "${image}" \
              --expected-alpine-digest "${ALPINE_DIGEST}" \
              --expected-golang-digest "${GOLANG_DIGEST}"
          )

      - name: Print decision
        run: |
          echo "release_tag=${{ steps.latest_release.outputs.release_tag }}"
          echo "should_rebuild=${{ steps.compare.outputs.should_rebuild }}"
          echo "reason=${{ steps.compare.outputs.reason }}"

  rebuild-stable-image:
    needs: detect-base-image-updates
    if: needs.detect-base-image-updates.outputs.should_rebuild == 'true'
    uses: ./.github/workflows/docker-stable-build.yaml
    with:
      release_tag: ${{ needs.detect-base-image-updates.outputs.release_tag }}
      build_reason: scheduled-base-refresh
    secrets: inherit
