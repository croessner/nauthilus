{{ template "idp_header.html" . }}
<div class="max-w-7xl mx-auto space-y-6">
    <section class="card bg-base-100 border border-base-300 shadow-sm">
        <div class="card-body gap-3">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                <div>
                    <h1 class="text-2xl font-semibold">{{ .AdminDashboardTitle }}</h1>
                    <p class="text-sm opacity-70">{{ .AdminDashboardHint }}</p>
                </div>
                <div class="flex items-center gap-2">
                    {{ if .AdminShowLogout }}
                    <form action="{{ .AdminBasePath }}/logout" method="post">
                        <input name="csrf_token" type="hidden" value="{{ .CSRFToken }}"/>
                        <button class="btn btn-xs btn-outline" type="submit">{{ .AdminLogoutLabel }}</button>
                    </form>
                    {{ end }}
                    <div class="badge badge-outline">{{ .Title }}</div>
                </div>
            </div>

            <div class="tabs tabs-boxed bg-base-200 p-1 overflow-x-auto" role="tablist">
                {{ range .Modules }}
                <button
                    class="tab"
                    data-module-tab
                    hx-get="{{ .Route }}"
                    hx-swap="innerHTML"
                    hx-target="#admin-module-content"
                    type="button">
                    {{ .Title }}
                </button>
                {{ end }}
            </div>
        </div>
    </section>

    <section hx-get="{{ .AdminBasePath }}/partial/dashboard"
             hx-swap="innerHTML"
             hx-trigger="load"
             id="admin-module-content">
    </section>
</div>
<script nonce="{{ cspNonce . }}" src="/static/js/admin_ui.js"></script>
{{ template "idp_footer.html" . }}
