name: Run Unit Tests
# Trigger refresh: workflow file touched to force GitHub Actions run creation.

on:
  push:
    branches:
      - features
  pull_request:
    branches:
      - features

permissions:
  contents: read

env:
  GOEXPERIMENT: runtimesecret

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_variant: [ default, auth_basic_endpoint ]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.x

      - name: Enable Go Modules
        run: go env -w GO111MODULE=on

      - name: Use Vendored Dependencies
        run: go env -w GOFLAGS=-mod=vendor

      - name: Run Unit Tests
        run: |
          if [ "${{ matrix.build_variant }}" = "auth_basic_endpoint" ]; then
            go test -tags auth_basic_endpoint $(go list ./... | grep -v /vendor/)
          else
            go test $(go list ./... | grep -v /vendor/)
          fi
