runtime:
  instance_name: "nauthilus-demo"

  listen:
    address: "0.0.0.0:8080"

identity:
  frontend:
    enabled: true
    encryption_secret: "demofrontendsecret123456"

    assets:
      html_static_content_path: "static/templates"
      language_resources: "server/resources"

    localization:
      languages:
        - "en"
      default_language: "en"

    security_headers:
      enabled: true
      content_security_policy:
        connect-src:
          - "'self'"
          - "https://api.example.test"
        form-action:
          - "'self'"
        form_action_optional_uris:
          - "http://localhost:8080"
      strict_transport_security:
        max_age: 31536000
        include_subdomains: true
        preload: false
      x_content_type_options: "nosniff"
      x_frame_options: "DENY"
      referrer_policy: "no-referrer"
      permissions_policy:
        features:
          geolocation: "()"
          microphone: "()"
          camera: "()"
          payment: "()"
          usb: "()"
      cross_origin_opener_policy: "same-origin"
      cross_origin_resource_policy: "same-origin"
      cross_origin_embedder_policy: "unsafe-none"
      x_permitted_cross_domain_policies: "none"
      x_dns_prefetch_control: "off"

  oidc:
    enabled: true
    issuer: "http://localhost:8080"

    tokens:
      token_endpoint_allow_get: false

    signing_keys:
      - id: "demo"
        key_file: "/etc/nauthilus/idp-signing-key.pem"
        active: true

    device_flow:
      code_expiry: 10m
      polling_interval: 5
      user_code_length: 8

    clients:
      - name: "PAM Demo"
        client_id: "ssh"
        client_secret: "demo-secret"
        grant_types:
          - urn:ietf:params:oauth:grant-type:device_code
        token_endpoint_auth_method: "client_secret_basic"
        scopes:
          - openid
          - profile
          - email
        access_token_claims:
          mappings:
            - claim: "preferred_username"
              attribute: "uid"
              type: "string"

observability:
  log:
    level: "debug"
    json: true
    add_source: true
    debug_modules: ["auth", "ldap", "idp"]

storage:
  redis:
    primary:
      address: "valkey:6379"
    database_number: 0
    prefix: "nauthilus:"
    pool_size: 16
    idle_pool_size: 4
    positive_cache_ttl: 1h
    negative_cache_ttl: 1h
    password_nonce: "demopasswordnonce123456"
    encryption_secret: "demoencryptionsecret123456"

auth:
  backchannel:
    oidc_bearer:
      enabled: true

  backends:
    order:
      - "cache"
      - "ldap"

    ldap:
      default:
        server_uri:
          - "ldap://openldap:389"
        bind_dn: "cn=admin,dc=demo,dc=local"
        bind_pw: "admin"
        lookup_pool_size: 5
        lookup_idle_pool_size: 2
        auth_pool_size: 5
        auth_idle_pool_size: 2

      search:
        - protocol:
            - "idp"
            - "oidc"
          cache_name: "ldap"
          base_dn: "ou=people,dc=demo,dc=local"
          filter:
            user: "(uid=%s)"
            list_accounts: "(uid=*)"
          mapping:
            account_field: "uid"
            display_name_field: "cn"
            unique_user_id_field: "uid"
          attribute:
            - "uid"
            - "cn"
            - "mail"
