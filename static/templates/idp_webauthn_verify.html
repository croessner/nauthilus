{{ template "idp_header.html" . }}
<div class="flex justify-center items-center mt-10">
    <div class="card w-full max-w-lg bg-base-100 shadow-xl">
        <div class="card-body items-center text-center">
            <h2 class="card-title text-2xl mb-4">{{ .Title }}</h2>

            <p class="mb-8">{{ .WebAuthnVerifyMessage }}</p>

            <div class="alert alert-info hidden mb-6" id="webauthn-status">
                <svg class="stroke-current shrink-0 w-6 h-6" fill="none" viewBox="0 0 24 24"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"
                          stroke-width="2"></path>
                </svg>
                <span id="status-text">{{ .JSInteractWithKey }}</span>
            </div>

            <div class="alert alert-error hidden mb-6" id="webauthn-error">
                <svg class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"
                     xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"
                          stroke-width="2"/>
                </svg>
                <span id="error-text"></span>
            </div>

            <button class="btn btn-primary btn-lg w-full" data-action="webauthn-login"
                    data-webauthn-begin="{{ .WebAuthnBeginEndpoint }}" data-webauthn-completing="{{ .JSCompletingLogin }}"
                    data-webauthn-csrf="{{ .CSRFToken }}" data-webauthn-finish="{{ .WebAuthnFinishEndpoint }}"
                    data-webauthn-next-url="/login" data-webauthn-unknown-error="{{ .JSUnknownError }}"
                    id="login-button" type="button">
                {{ .Submit }}
            </button>

            <div class="mt-4 text-center">
                <a class="link link-hover text-sm" href="{{ .BackURL }}">
                    {{ .Back }}
                </a>
            </div>
        </div>
    </div>
</div>

{{ template "idp_footer.html" . }}
