version: "2"

run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  default: standard
  enable:
    - dupl
    - errcheck
    - funlen
    - goconst
    - gocyclo
    - govet
    - revive
    - unused
    - wsl_v5
  settings:
    dupl:
      threshold: 75
    funlen:
      lines: 60
      statements: 40
    goconst:
      min-len: 2
      min-occurrences: 2
      ignore-tests: true
    gocyclo:
      min-complexity: 12
    errcheck:
      exclude-functions:
        - (github.com/croessner/nauthilus/v3/server/log/level.Logger).Log
  exclusions:
    paths:
      - vendor/
