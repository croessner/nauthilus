global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: nauthilus
    metrics_path: /metrics
    # Enable this block when observability.metrics.endpoint_auth.basic.enabled=true.
    # basic_auth:
    #   username: prometheus
    #   password: your-dedicated-metrics-password
    static_configs:
      - targets:
        - localhost:80
