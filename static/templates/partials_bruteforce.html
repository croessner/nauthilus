<div class="card-body gap-4">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div>
            <h2 class="card-title">{{ .AdminBruteForceTitle }}</h2>
            <p class="text-sm opacity-75">{{ .AdminBruteForceHint }}</p>
        </div>
        <div class="badge badge-outline">runtime</div>
    </div>

    <form class="space-y-3" data-api-free-ip-url="{{ .AdminBasePath }}/api/bruteforce/free-ip"
          data-api-free-user-url="{{ .AdminBasePath }}/api/bruteforce/free-user"
          data-api-list-url="{{ .AdminBasePath }}/api/bruteforce/list"
          data-label-free-ip="{{ .AdminBruteForceFreeIP }}"
          data-label-free-user="{{ .AdminBruteForceFreeUser }}"
          id="admin-bf-form">
        <input name="tab" type="hidden" value="ips"/>
        <input name="page" type="hidden" value="1"/>
        <input name="page_size" type="hidden" value="25"/>

        <div class="flex flex-wrap gap-2">
            <button class="btn btn-sm btn-active" data-bf-tab data-bf-tab-value="ips" type="button">{{
                .AdminBruteForceTabIPs }}
            </button>
            <button class="btn btn-sm btn-outline" data-bf-tab data-bf-tab-value="accounts" type="button">{{
                .AdminBruteForceTabAccounts }}
            </button>
        </div>

        <div class="flex flex-col md:flex-row gap-2">
            <input class="input input-bordered input-sm w-full" name="search"
                   placeholder="{{ .AdminBruteForceSearchPlaceholder }}" type="text"/>
            <button class="btn btn-sm btn-outline" data-bf-refresh type="button">{{ .AdminBruteForceRefresh }}</button>
        </div>
    </form>

    <div class="text-xs opacity-70" data-no-data="{{ .AdminNoData }}" id="admin-bf-summary">{{ .AdminNoData }}</div>

    <div class="overflow-x-auto">
        <table class="table table-sm" id="admin-bf-table">
            <thead>
            <tr>
                <th>{{ .AdminTableColumnIP }}</th>
                <th>{{ .AdminTableColumnAccount }}</th>
                <th>{{ .AdminTableColumnProtocol }}</th>
                <th>{{ .AdminTableColumnTimestamp }}</th>
                <th></th>
            </tr>
            </thead>
            <tbody data-no-data="{{ .AdminNoData }}" id="admin-bf-table-body">
            <tr>
                <td class="text-center opacity-70" colspan="5">{{ .AdminNoData }}</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
