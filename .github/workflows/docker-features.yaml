---
name: Development Docker Build

"on":
  push:
    branches:
      - features

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/docker-build-push.yaml
    with:
      source_ref: ${{ github.sha }}
      fetch_depth: 0
      dockerfile_path: Dockerfile.debug
      tags: |
        ghcr.io/${{ github.repository_owner }}/nauthilus:dev
        ghcr.io/${{ github.repository_owner }}/nauthilus:dev-dbg
      annotations: >-
        index,manifest:org.opencontainers.image.description=Authentication
        and identity platform with OIDC, SAML, MFA, LDAP, Lua, and mail
        integrations
    secrets: inherit
